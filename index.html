<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault - Shared Credential Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'DM Mono', Consolas, monospace; 
      background: #0c0c0c; 
      color: #94a3b8; 
      min-height: 100vh;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-up { animation: fadeUp 0.3s ease-out forwards; }
    .spinner { 
      width: 24px; height: 24px; border: 2px solid #181818; 
      border-top-color: #94a3b8; border-radius: 50%; 
      animation: spin 0.8s linear infinite; 
    }
    input, button, textarea { 
      font-family: inherit; font-size: 13px; 
    }
    button { cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0c0c0c; }
    ::-webkit-scrollbar-thumb { background: #181818; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #1e1e1e; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
  
  <!-- Crypto JS for password encryption -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  
  <!-- React 18 + ReactDOM + Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel">
    /*
    ============================================
    FIREBASE SETUP INSTRUCTIONS
    ============================================
    
    Step 1: Go to https://console.firebase.google.com and create a new project
    
    Step 2: Enable Authentication:
      - Go to "Authentication" â†’ "Sign-in method"
      - Enable "Email/Password"
      - No need to enable "Email link" for this app
    
    Step 3: Create Firestore Database:
      - Go to "Firestore Database" â†’ "Create database"
      - Start in production mode (or test mode)
      - Select a location near you
    
    Step 4: Get your Firebase config:
      - Go to Project Settings (gear icon)
      - Scroll down to "Your apps" â†’ click the web icon </>
      - Copy the firebaseConfig object
    
    Step 5: Paste your config below in the firebaseConfig variable
    
    Step 6: Deploy these Firestore Security Rules:
      - Go to Firestore â†’ "Rules" tab
      - Paste the security rules from the comment block below
      - Publish the rules
    
    ============================================
    FIRESTORE SECURITY RULES
    ============================================
    rules_version = '2';
    service cloud.firestore {
      match /databases/{database}/documents {
        match /vaults/{userId}/{document=**} {
          allow read, write: if request.auth.uid == userId;
        }
        match /users/{userId} {
          allow read: if request.auth != null;
          allow write: if request.auth.uid == userId;
        }
      }
    }
    */

    // ============================================
    // FIREBASE CONFIG - PASTE YOUR OWN BELOW
    // ============================================
    const firebaseConfig = {
      apiKey: "AIzaSyD2fwvRAn7YH6-xL7__xdwDLKAgqCb4AD4",
      authDomain: "creds-safe.firebaseapp.com",
      projectId: "creds-safe",
      storageBucket: "creds-safe.firebasestorage.app",
      messagingSenderId: "56431625516",
      appId: "1:56431625516:web:fe2670ad5916355dec5889",
      measurementId: "G-F831TLYMBL"
    };

    // Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(app);
    const db = firebase.firestore(app);

    // Configure local persistence
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

    // Crypto utilities
    const encrypt = (text, key) => CryptoJS.AES.encrypt(text, key).toString();
    const decrypt = (ciphertext, key) => {
      try {
        const bytes = CryptoJS.AES.decrypt(ciphertext, key);
        return bytes.toString(CryptoJS.enc.Utf8);
      } catch (e) { return ''; }
    };

    const getEncryptionKey = (uid) => uid || 'default';

    // SVG Icons
    const Icon = ({ name, size = 16 }) => {
      const icons = {
        eye: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
        eyeOff: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>,
        copy: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
        check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
        plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
        trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
        edit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
        chevron: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>,
        search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
        user: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
        settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
        logout: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
        x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      };
      return <span style={{display: 'inline-flex'}}>{icons[name]}</span>;
    };

    // Styles
    const styles = {
      app: { display: 'flex', minHeight: '100vh', background: '#0c0c0c' },
      sidebar: { width: 190, borderRight: '1px solid #181818', display: 'flex', flexDirection: 'column', background: '#0c0c0c' },
      sidebarHeader: { padding: '16px', borderBottom: '1px solid #181818' },
      sidebarTitle: { fontSize: 18, fontWeight: 500, color: '#fff', letterSpacing: 1 },
      sidebarContent: { flex: 1, overflow: 'auto', padding: '8px 0' },
      personTabs: { display: 'flex', gap: 4, padding: '8px', borderBottom: '1px solid #181818' },
      personTab: (active) => ({ flex: 1, padding: '8px', background: active ? '#111' : 'transparent', border: '1px solid', borderColor: active ? '#1e1e1e' : 'transparent', color: active ? '#fff' : '#94a3b8', textAlign: 'center', cursor: 'pointer', fontSize: 12 }),
      userInfo: { padding: '12px', borderTop: '1px solid #181818', display: 'flex', alignItems: 'center', justifyContent: 'space-between' },
      userEmail: { fontSize: 11, color: '#64748b', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 100 },
      main: { flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' },
      mainHeader: { padding: '16px 24px', borderBottom: '1px solid #181818', display: 'flex', alignItems: 'center', justifyContent: 'space-between' },
      mainContent: { flex: 1, overflow: 'auto', padding: '24px' },
      searchBar: { display: 'flex', alignItems: 'center', background: '#111', border: '1px solid #1e1e1e', borderRadius: 4, padding: '8px 12px', gap: 8 },
      searchInput: { flex: 1, background: 'transparent', border: 'none', color: '#94a3b8', outline: 'none' },
      categoryItem: { borderBottom: '1px solid #181818' },
      categoryHeader: { display: 'flex', alignItems: 'center', padding: '12px 16px', cursor: 'pointer', gap: 8, transition: 'background 0.15s' },
      categoryTitle: { flex: 1, fontSize: 13, color: '#fff' },
      categoryCount: { fontSize: 11, color: '#64748b', background: '#111', padding: '2px 6px', borderRadius: 10 },
      subcategoryItem: { padding: '8px 16px 8px 32px' },
      subcategoryHeader: { display: 'flex', alignItems: 'center', padding: '8px 0', cursor: 'pointer', gap: 8 },
      subcategoryTitle: { fontSize: 12, color: '#94a3b8' },
      credRow: { display: 'flex', alignItems: 'center', padding: '8px 16px 8px 48px', gap: 12, borderTop: '1px solid #181818' },
      credPlatform: { flex: 1, fontSize: 13, color: '#fff' },
      credUser: { flex: 1, fontSize: 12, color: '#64748b' },
      credPass: { fontSize: 12, color: '#64748b', display: 'flex', alignItems: 'center', gap: 4 },
      iconBtn: { background: 'transparent', border: 'none', color: '#64748b', padding: 4, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', borderRadius: 4, transition: 'all 0.15s' },
      btn: { padding: '8px 16px', background: '#111', border: '1px solid #1e1e1e', color: '#94a3b8', cursor: 'pointer', fontSize: 13, borderRadius: 4, transition: 'all 0.15s' },
      btnPrimary: { background: '#1e1e1e', color: '#fff', border: '1px solid #2a2a2a' },
      btnDanger: { background: '#2a1515', color: '#ef4444', border: '1px solid #3a2020' },
      input: { width: '100%', padding: '10px 12px', background: '#111', border: '1px solid #1e1e1e', color: '#94a3b8', borderRadius: 4, outline: 'none', marginBottom: 12 },
      label: { display: 'block', fontSize: 11, color: '#64748b', marginBottom: 6, textTransform: 'uppercase', letterSpacing: 0.5 },
      modal: { position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.8)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 },
      modalContent: { background: '#111', border: '1px solid #1e1e1e', borderRadius: 8, padding: 24, width: 360, maxWidth: '90vw' },
      modalTitle: { fontSize: 16, color: '#fff', marginBottom: 20, fontWeight: 500 },
      modalActions: { display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 20 },
      authScreen: { display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', background: '#0c0c0c' },
      authCard: { width: 320, background: '#111', border: '1px solid #1e1e1e', borderRadius: 8, padding: 32 },
      authTitle: { fontSize: 24, color: '#fff', textAlign: 'center', marginBottom: 8 },
      authSubtitle: { fontSize: 12, color: '#64748b', textAlign: 'center', marginBottom: 24 },
      error: { color: '#ef4444', fontSize: 12, marginBottom: 12, padding: '8px 12px', background: '#2a1515', borderRadius: 4 },
      empty: { textAlign: 'center', padding: '40px 20px', color: '#64748b', fontSize: 13 },
      settingsBtn: { display: 'flex', alignItems: 'center', gap: 8, padding: '12px 16px', cursor: 'pointer', borderTop: '1px solid #181818', color: '#64748b', fontSize: 12 },
      chevron: (open) => ({ transform: open ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s', color: '#64748b' }),
      formRow: { display: 'flex', gap: 8, marginBottom: 12 },
      formCol: { flex: 1 }
    };

    // Modal Component
    const Modal = ({ title, onClose, children }) => (
      <div style={styles.modal} onClick={(e) => e.target === e.currentTarget && onClose()}>
        <div style={styles.modalContent}>
          <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20}}>
            <span style={styles.modalTitle}>{title}</span>
            <button style={styles.iconBtn} onClick={onClose}><Icon name="x" /></button>
          </div>
          {children}
        </div>
      </div>
    );

    // Loading Spinner
    const Loading = () => (
      <div style={{...styles.authScreen, flexDirection: 'column', gap: 16}}>
        <div className="spinner" style={{width: 32, height: 32}}></div>
        <span style={{color: '#64748b', fontSize: 13}}>Loading...</span>
      </div>
    );

    // Auth Screen
    const AuthScreen = ({ onLogin }) => {
      const [isRegister, setIsRegister] = React.useState(false);
      const [email, setEmail] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [error, setError] = React.useState('');
      const [loading, setLoading] = React.useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          if (isRegister) {
            await auth.createUserWithEmailAndPassword(email, password);
          } else {
            await auth.signInWithEmailAndPassword(email, password);
          }
        } catch (err) {
          setError(err.message.replace('Firebase: ', ''));
        }
        setLoading(false);
      };

      return (
        <div style={styles.authScreen}>
          <div style={styles.authCard}>
            <div style={styles.authTitle}>Vault</div>
            <div style={styles.authSubtitle}>Credential Manager</div>
            {error && <div style={styles.error}>{error}</div>}
            <form onSubmit={handleSubmit}>
              <label style={styles.label}>Email</label>
              <input type="email" style={styles.input} value={email} onChange={(e) => setEmail(e.target.value)} placeholder="email@example.com" required />
              <label style={styles.label}>Password</label>
              <input type="password" style={styles.input} value={password} onChange={(e) => setPassword(e.target.value)} placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required />
              <button type="submit" style={{...styles.btn, ...styles.btnPrimary, width: '100%', marginTop: 8}} disabled={loading}>
                {loading ? 'Please wait...' : (isRegister ? 'Create Account' : 'Login')}
              </button>
            </form>
            <div style={{textAlign: 'center', marginTop: 16, fontSize: 12, color: '#64748b'}}>
              {isRegister ? 'Already have an account? ' : "Don't have an account? "}
              <span style={{color: '#94a3b8', cursor: 'pointer', textDecoration: 'underline'}} onClick={() => { setIsRegister(!isRegister); setError(''); }}>
                {isRegister ? 'Login' : 'Register'}
              </span>
            </div>
          </div>
        </div>
      );
    };

    // Main App Component
    const App = () => {
      const [user, setUser] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [activePerson, setActivePerson] = React.useState('me');
      const [categories, setCategories] = React.useState([]);
      const [subcategories, setSubcategories] = React.useState([]);
      const [credentials, setCredentials] = React.useState([]);
      const [search, setSearch] = React.useState('');
      const [expandedCats, setExpandedCats] = React.useState({});
      const [expandedSubs, setExpandedSubs] = React.useState({});
      const [showPasswords, setShowPasswords] = React.useState({});
      const [copied, setCopied] = React.useState({});
      const [showSettings, setShowSettings] = React.useState(false);
      const [partnerEmail, setPartnerEmail] = React.useState('');
      const [loadingPartner, setLoadingPartner] = React.useState(false);

      // Modals
      const [modal, setModal] = React.useState(null);

      // Listen to auth state
      React.useEffect(() => {
        const unsub = auth.onAuthStateChanged((u) => {
          setUser(u);
          setLoading(false);
        });
        return unsub;
      }, []);

      // Subscribe to Firestore data
      React.useEffect(() => {
        if (!user) return;
        const uid = user.uid;

        const catsSub = db.collection('vaults').doc(uid).collection('categories')
          .orderBy('order').onSnapshot((snap) => {
            setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          });

        const subsSub = db.collection('vaults').doc(uid).collection('subcategories')
          .orderBy('order').onSnapshot((snap) => {
            setSubcategories(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          });

        const credsSub = db.collection('vaults').doc(uid).collection('credentials')
          .onSnapshot((snap) => {
            setCredentials(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          });

        return () => { catsSub(); subsSub(); credsSub(); };
      }, [user]);

      const encryptionKey = user ? getEncryptionKey(user.uid) : '';

      // Get counts
      const getCredCount = (personId, catId, subId) => {
        return credentials.filter(c => 
          c.personId === personId && 
          (catId ? c.categoryId === catId : true) &&
          (subId ? c.subId === subId : true)
        ).length;
      };

      // Search filter
      const filteredCredentials = credentials.filter(c => 
        c.personId === activePerson &&
        (search === '' || 
          c.platform.toLowerCase().includes(search.toLowerCase()) || 
          c.user.toLowerCase().includes(search.toLowerCase()))
      );

      // CRUD Operations
      const addCategory = async (label) => {
        const doc = await db.collection('vaults').doc(user.uid).collection('categories').add({
          label, personId: activePerson, order: categories.filter(c => c.personId === activePerson).length, createdAt: Date.now()
        });
        setExpandedCats(prev => ({ ...prev, [doc.id]: true }));
      };

      const deleteCategory = async (id) => {
        const toDelete = credentials.filter(c => c.categoryId === id);
        const batch = db.batch();
        toDelete.forEach(c => batch.delete(db.collection('vaults').doc(user.uid).collection('credentials').doc(c.id)));
        subcategories.filter(s => s.categoryId === id).forEach(s => batch.delete(db.collection('vaults').doc(user.uid).collection('subcategories').doc(s.id)));
        batch.delete(db.collection('vaults').doc(user.uid).collection('categories').doc(id));
        await batch.commit();
      };

      const addSubcategory = async (label, categoryId) => {
        const doc = await db.collection('vaults').doc(user.uid).collection('subcategories').add({
          label, categoryId, personId: activePerson, order: subcategories.filter(s => s.categoryId === categoryId).length, createdAt: Date.now()
        });
        setExpandedSubs(prev => ({ ...prev, [doc.id]: true }));
      };

      const deleteSubcategory = async (id) => {
        const batch = db.batch();
        credentials.filter(c => c.subId === id).forEach(c => batch.delete(db.collection('vaults').doc(user.uid).collection('credentials').doc(c.id)));
        batch.delete(db.collection('vaults').doc(user.uid).collection('subcategories').doc(id));
        await batch.commit();
      };

      const addCredential = async (platform, username, password) => {
        const encPass = encrypt(password, encryptionKey);
        const catId = modal.data?.categoryId;
        const subId = modal.data?.subId;
        await db.collection('vaults').doc(user.uid).collection('credentials').add({
          platform, user: username, encryptedPass: encPass, categoryId: catId, subId: subId || null, personId: activePerson, createdAt: Date.now()
        });
      };

      const updateCredential = async (id, platform, username, password) => {
        const encPass = encrypt(password, encryptionKey);
        await db.collection('vaults').doc(user.uid).collection('credentials').doc(id).update({ platform, user: username, encryptedPass: encPass });
      };

      const deleteCredential = async (id) => {
        await db.collection('vaults').doc(user.uid).collection('credentials').doc(id).delete();
      };

      // Clipboard
      const copyToClipboard = (text, key) => {
        navigator.clipboard.writeText(text);
        setCopied(prev => ({ ...prev, [key]: true }));
        setTimeout(() => setCopied(prev => ({ ...prev, [key]: false })), 1500);
      };

      // Add partner
      const addPartner = async () => {
        if (!partnerEmail) return;
        setLoadingPartner(true);
        try {
          const snap = await db.collection('users').where('email', '==', partnerEmail).get();
          if (snap.empty) {
            alert('User not found. They must register first.');
          } else {
            const partnerUid = snap.docs[0].id;
            await db.collection('vaults').doc(user.uid).set({ sharedWith: [partnerUid] }, { merge: true });
            alert('Partner added! They can now read your vault.');
            setShowSettings(false);
          }
        } catch (e) { alert('Error: ' + e.message); }
        setLoadingPartner(false);
      };

      // Build category tree
      const cats = categories.filter(c => c.personId === activePerson).sort((a, b) => a.order - b.order);
      const subs = subcategories.filter(s => s.personId === activePerson);

      if (loading) return <Loading />;
      if (!user) return <AuthScreen />;

      return (
        <div style={styles.app}>
          {/* Sidebar */}
          <div style={styles.sidebar}>
            <div style={styles.sidebarHeader}>
              <div style={styles.sidebarTitle}>VAULT</div>
            </div>
            
            <div style={styles.personTabs}>
              <button style={styles.personTab(activePerson === 'me')} onClick={() => setActivePerson('me')}>Me</button>
              <button style={styles.personTab(activePerson === 'her')} onClick={() => setActivePerson('her')}>Her</button>
            </div>

            <div style={styles.sidebarContent}>
              {cats.length === 0 ? (
                <div style={{...styles.empty, padding: '20px', fontSize: 11}}>No categories yet</div>
              ) : cats.map(cat => {
                const catSubs = subs.filter(s => s.categoryId === cat.id);
                const count = getCredCount(activePerson, cat.id);
                return (
                  <div key={cat.id} style={styles.categoryItem}>
                    <div style={styles.categoryHeader} onClick={() => setExpandedCats(p => ({ ...p, [cat.id]: !p[cat.id] }))}>
                      <span style={styles.chevron(expandedCats[cat.id])}><Icon name="chevron" size={14} /></span>
                      <span style={styles.categoryTitle}>{cat.label}</span>
                      <span style={styles.categoryCount}>{count}</span>
                      <button style={{...styles.iconBtn, marginLeft: 'auto'}} onClick={(e) => { e.stopPropagation(); setModal({ type: 'deleteCategory', data: cat }); }} title="Delete">
                        <Icon name="trash" size={12} />
                      </button>
                    </div>
                    {expandedCats[cat.id] && catSubs.map(sub => {
                      const subCount = getCredCount(activePerson, cat.id, sub.id);
                      return (
                        <div key={sub.id} style={styles.subcategoryItem}>
                          <div style={styles.subcategoryHeader} onClick={() => setExpandedSubs(p => ({ ...p, [sub.id]: !p[sub.id] }))}>
                            <span style={styles.chevron(expandedSubs[sub.id])}><Icon name="chevron" size={12} /></span>
                            <span style={styles.subcategoryTitle}>{sub.label}</span>
                            <span style={{...styles.categoryCount, fontSize: 10}}>{subCount}</span>
                            <button style={{...styles.iconBtn, marginLeft: 'auto'}} onClick={(e) => { e.stopPropagation(); setModal({ type: 'deleteSubcategory', data: sub }); }} title="Delete">
                              <Icon name="trash" size={10} />
                            </button>
                          </div>
                          {expandedSubs[sub.id] && (
                            <div style={{paddingLeft: 8}}>
                              {filteredCredentials.filter(c => c.subId === sub.id).map(cred => (
                                <CredentialRow 
                                  key={cred.id} 
                                  cred={cred} 
                                  decrypt={(p) => decrypt(p, encryptionKey)}
                                  showPasswords={showPasswords}
                                  setShowPasswords={setShowPasswords}
                                  copied={copied}
                                  copyToClipboard={copyToClipboard}
                                  onEdit={() => setModal({ type: 'editCredential', data: cred })}
                                  onDelete={() => setModal({ type: 'deleteCredential', data: cred })}
                                />
                              ))}
                              <button style={{...styles.btn, width: '100%', fontSize: 11, padding: '6px 12px', display: 'flex', alignItems: 'center', gap: 6, justifyContent: 'center'}} onClick={() => setModal({ type: 'addCredential', data: { categoryId: cat.id, subId: sub.id } })}>
                                <Icon name="plus" size={12} /> Add Credential
                              </button>
                            </div>
                          )}
                        </div>
                      );
                    })}
                    {expandedCats[cat.id] && (
                      <div style={{padding: '8px 16px 8px 32px'}}>
                        <button style={{...styles.btn, width: '100%', fontSize: 11, padding: '6px 12px', display: 'flex', alignItems: 'center', gap: 6, justifyContent: 'center'}} onClick={() => setModal({ type: 'addSubcategory', data: { categoryId: cat.id } })}>
                          <Icon name="plus" size={12} /> Add Subcategory
                        </button>
                        {filteredCredentials.filter(c => c.categoryId === cat.id && !c.subId).map(cred => (
                          <CredentialRow 
                            key={cred.id} 
                            cred={cred} 
                            decrypt={(p) => decrypt(p, encryptionKey)}
                            showPasswords={showPasswords}
                            setShowPasswords={setShowPasswords}
                            copied={copied}
                            copyToClipboard={copyToClipboard}
                            onEdit={() => setModal({ type: 'editCredential', data: cred })}
                            onDelete={() => setModal({ type: 'deleteCredential', data: cred })}
                          />
                        ))}
                        <button style={{...styles.btn, width: '100%', fontSize: 11, padding: '6px 12px', display: 'flex', alignItems: 'center', gap: 6, justifyContent: 'center'}} onClick={() => setModal({ type: 'addCredential', data: { categoryId: cat.id } })}>
                          <Icon name="plus" size={12} /> Add Credential
                        </button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div style={{padding: 8, borderTop: '1px solid #181818'}}>
              <button style={{...styles.btn, width: '100%', display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'center'}} onClick={() => setModal({ type: 'addCategory' })}>
                <Icon name="plus" size={14} /> Add Category
              </button>
            </div>

            <div style={styles.settingsBtn} onClick={() => setShowSettings(true)}>
              <Icon name="settings" size={14} />
              <span>Settings</span>
            </div>

            <div style={styles.userInfo}>
              <span style={styles.userEmail}>{user.email}</span>
              <button style={styles.iconBtn} onClick={() => auth.signOut()} title="Logout">
                <Icon name="logout" size={14} />
              </button>
            </div>
          </div>

          {/* Main Content */}
          <div style={styles.main}>
            <div style={styles.mainHeader}>
              <div style={styles.searchBar}>
                <Icon name="search" size={14} />
                <input type="text" style={styles.searchInput} placeholder="Search platforms and usernames..." value={search} onChange={(e) => setSearch(e.target.value)} />
              </div>
            </div>
            <div style={styles.mainContent}>
              {search && filteredCredentials.length === 0 && (
                <div style={styles.empty}>No results found for "{search}"</div>
              )}
            </div>
          </div>

          {/* Modals */}
          {modal?.type === 'addCategory' && (
            <Modal title="Add Category" onClose={() => setModal(null)}>
              <form onSubmit={(e) => { e.preventDefault(); addCategory(e.target.label.value); setModal(null); }}>
                <label style={styles.label}>Category Name</label>
                <input name="label" style={styles.input} autoFocus required />
                <div style={styles.modalActions}>
                  <button type="button" style={styles.btn} onClick={() => setModal(null)}>Cancel</button>
                  <button type="submit" style={{...styles.btn, ...styles.btnPrimary}}>Add</button>
                </div>
              </form>
            </Modal>
          )}

          {modal?.type === 'deleteCategory' && (
            <Modal title="Delete Category" onClose={() => setModal(null)}>
              <p style={{marginBottom: 16, fontSize: 13}}>Delete "{modal.data.label}" and all its subcategories and credentials?</p>
              <div style={styles.modalActions}>
                <button style={styles.btn} onClick={() => setModal(null)}>Cancel</button>
                <button style={{...styles.btn, ...styles.btnDanger}} onClick={() => { deleteCategory(modal.data.id); setModal(null); }}>Delete</button>
              </div>
            </Modal>
          )}

          {modal?.type === 'addSubcategory' && (
            <Modal title="Add Subcategory" onClose={() => setModal(null)}>
              <form onSubmit={(e) => { e.preventDefault(); addSubcategory(e.target.label.value, modal.data.categoryId); setModal(null); }}>
                <label style={styles.label}>Subcategory Name</label>
                <input name="label" style={styles.input} autoFocus required />
                <div style={styles.modalActions}>
                  <button type="button" style={styles.btn} onClick={() => setModal(null)}>Cancel</button>
                  <button type="submit" style={{...styles.btn, ...styles.btnPrimary}}>Add</button>
                </div>
              </form>
            </Modal>
          )}

          {modal?.type === 'deleteSubcategory' && (
            <Modal title="Delete Subcategory" onClose={() => setModal(null)}>
              <p style={{marginBottom: 16, fontSize: 13}}>Delete "{modal.data.label}" and all its credentials?</p>
              <div style={styles.modalActions}>
                <button style={styles.btn} onClick={() => setModal(null)}>Cancel</button>
                <button style={{...styles.btn, ...styles.btnDanger}} onClick={() => { deleteSubcategory(modal.data.id); setModal(null); }}>Delete</button>
              </div>
            </Modal>
          )}

          {modal?.type === 'addCredential' && (
            <Modal title="Add Credential" onClose={() => setModal(null)}>
              <form onSubmit={(e) => { e.preventDefault(); addCredential(e.target.platform.value, e.target.user.value, e.target.pass.value); setModal(null); }}>
                <label style={styles.label}>Platform</label>
                <input name="platform" style={styles.input} placeholder="e.g. Google" autoFocus required />
                <label style={styles.label}>Username</label>
                <input name="user" style={styles.input} placeholder="email or username" required />
                <label style={styles.label}>Password</label>
                <input name="pass" type="password" style={styles.input} placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required />
                <div style={styles.modalActions}>
                  <button type="button" style={styles.btn} onClick={() => setModal(null)}>Cancel</button>
                  <button type="submit" style={{...styles.btn, ...styles.btnPrimary}}>Save</button>
                </div>
              </form>
            </Modal>
          )}

          {modal?.type === 'editCredential' && (
            <Modal title="Edit Credential" onClose={() => setModal(null)}>
              <form onSubmit={(e) => { e.preventDefault(); updateCredential(modal.data.id, e.target.platform.value, e.target.user.value, e.target.pass.value); setModal(null); }}>
                <label style={styles.label}>Platform</label>
                <input name="platform" style={styles.input} defaultValue={modal.data.platform} autoFocus required />
                <label style={styles.label}>Username</label>
                <input name="user" style={styles.input} defaultValue={modal.data.user} required />
                <label style={styles.label}>Password</label>
                <input name="pass" type="password" style={styles.input} defaultValue={decrypt(modal.data.encryptedPass, encryptionKey)} required />
                <div style={styles.modalActions}>
                  <button type="button" style={styles.btn} onClick={() => setModal(null)}>Cancel</button>
                  <button type="submit" style={{...styles.btn, ...styles.btnPrimary}}>Save</button>
                </div>
              </form>
            </Modal>
          )}

          {modal?.type === 'deleteCredential' && (
            <Modal title="Delete Credential" onClose={() => setModal(null)}>
              <p style={{marginBottom: 16, fontSize: 13}}>Delete credential for "{modal.data.platform}"?</p>
              <div style={styles.modalActions}>
                <button style={styles.btn} onClick={() => setModal(null)}>Cancel</button>
                <button style={{...styles.btn, ...styles.btnDanger}} onClick={() => { deleteCredential(modal.data.id); setModal(null); }}>Delete</button>
              </div>
            </Modal>
          )}

          {/* Settings Modal */}
          {showSettings && (
            <Modal title="Settings" onClose={() => setShowSettings(false)}>
              <label style={styles.label}>Partner Email</label>
              <p style={{fontSize: 11, color: '#64748b', marginBottom: 12}}>Enter partner's email to give them read access to your vault.</p>
              <div style={{display: 'flex', gap: 8}}>
                <input style={{...styles.input, marginBottom: 0}} placeholder="partner@example.com" value={partnerEmail} onChange={(e) => setPartnerEmail(e.target.value)} />
                <button style={{...styles.btn, ...styles.btnPrimary, whiteSpace: 'nowrap'}} onClick={addPartner} disabled={loadingPartner}>
                  {loadingPartner ? '...' : 'Add'}
                </button>
              </div>
              <div style={styles.modalActions}>
                <button style={styles.btn} onClick={() => setShowSettings(false)}>Close</button>
              </div>
            </Modal>
          )}
        </div>
      );
    };

    // Credential Row Component
    const CredentialRow = ({ cred, decrypt, showPasswords, setShowPasswords, copied, copyToClipboard, onEdit, onDelete }) => {
      const passKey = `pass-${cred.id}`;
      const userKey = `user-${cred.id}`;
      const decryptedPass = decrypt(cred.encryptedPass);
      
      return (
        <div style={styles.credRow} className="fade-up">
          <span style={styles.credPlatform}>{cred.platform}</span>
          <span style={styles.credUser}>{cred.user}</span>
          <span style={styles.credPass}>
            {showPasswords[passKey] ? decryptedPass : 'â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢'}
          </span>
          <button style={styles.iconBtn} onClick={() => setShowPasswords(p => ({ ...p, [passKey]: !p[passKey] }))} title={showPasswords[passKey] ? 'Hide' : 'Show'}>
            {showPasswords[passKey] ? <Icon name="eyeOff" size={12} /> : <Icon name="eye" size={12} />}
          </button>
          <button style={styles.iconBtn} onClick={() => copyToClipboard(cred.user, userKey)} title="Copy username">
            {copied[userKey] ? <Icon name="check" size={12} /> : <Icon name="copy" size={12} />}
          </button>
          <button style={styles.iconBtn} onClick={() => copyToClipboard(decryptedPass, passKey)} title="Copy password">
            {copied[passKey] ? <Icon name="check" size={12} /> : <Icon name="copy" size={12} />}
          </button>
          <button style={styles.iconBtn} onClick={onEdit} title="Edit">
            <Icon name="edit" size={12} />
          </button>
          <button style={{...styles.iconBtn, color: '#ef4444'}} onClick={onDelete} title="Delete">
            <Icon name="trash" size={12} />
          </button>
        </div>
      );
    };

    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
